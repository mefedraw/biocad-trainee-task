embedding:
  model: "microsoft/BiomedNLP-PubMedBERT-base-uncased-abstract-fulltext"
  device: "cpu"

chunking:
  chunk_size: 500
  chunk_overlap: 100
  min_chunk_size: 100

vector_db:
  type: "chroma"
  persist_directory: "storage/chroma"
  collection_name: "alzheimer_targets"

rag:
  top_k_retrieval: 30
  top_k_rerank: 8
  rerank_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  enable_reranking: true
  max_distance: 1.2
  min_rerank_score: -10.0

llm:
  provider: "groq"
  model: "openai/gpt-oss-120b"
  temperature: 0.1
  max_tokens: 1500

grobid:
  url: "http://localhost:8070"
  timeout: 60

paths:
  raw_data: "data/raw"
  processed_data: "data"
  papers_dir: "papers"
  reports_dir: "reports"
